<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBZO Hallenbelegung</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            background-image: url('Logo.png');
            background-size: cover;          
            background-position: center;     
            background-repeat: no-repeat;    
            background-attachment: fixed;    
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: -1;
        }

        /* ============================================================
           Bannermeldungen - Laufschrift (Ganz oben platziert)
           ============================================================ */
        .news-ticker-container {
            background: rgba(34, 34, 34, 0.85);
            backdrop-filter: blur(5px);
            padding: 12px 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            margin-bottom: 15px;
            display: none; /* Wird per JS eingeblendet, wenn Meldungen da sind */
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
            z-index: 1;
            border-left: 5px solid #e67e22;
            overflow: hidden;
        }

        .news-icon {
            font-size: 1.4em;
            flex-shrink: 0;
        }

        .ticker-wrapper {
            overflow: hidden;
            width: 100%;
            white-space: nowrap;
            box-sizing: border-box;
        }

        .ticker-text {
            display: inline-block;
            color: #fff;
            font-size: 0.95em;
            font-weight: 500;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        h1 {
            color: #fff;
            z-index: 1;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 2.2em;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .untertitel-titel {
            color: #ddd;
            z-index: 1;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.3em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .datum-untertitel {
            color: #ccc;
            z-index: 1;
            margin-bottom: 20px;
            font-size: 1.1em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        #info { 
            background: rgba(34, 34, 34, 0.85); 
            backdrop-filter: blur(5px);         
            padding: 25px; 
            border-radius: 12px; 
            width: 100%;
            max-width: 450px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); 
            min-height: 150px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 1;
            box-sizing: border-box;
        }

        .block-titel { font-size: 1.2em; color: #aaa; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; width: 100%; }
        .lektion-eintrag { background: rgba(51, 51, 51, 0.9); margin: 8px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #e67e22; width: 100%; box-sizing: border-box; }
        .klasse { font-size: 1.5em; color: #e67e22; font-weight: bold; }
        .halle { font-size: 1.2em; color: #ddd; font-weight: bold; }
        .hinweis { color: #aaa; font-style: italic; margin-top: 15px; line-height: 1.4; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #e67e22;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Laufschrift-Banner ganz oben -->
    <div id="news-ticker-banner" class="news-ticker-container">
        <span class="news-icon">📢</span>
        <div class="ticker-wrapper">
            <div id="news-ticker-content" class="ticker-text"></div>
        </div>
    </div>

    <h1>BBZO Sport</h1>
    <div class="untertitel-titel">Aktuelle Hallenbelegung</div>
    <div id="datum" class="datum-untertitel"></div>
    
    <div id="info">
        <div class="spinner"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxCHPxDHj0Eoj1NXOgGR85ETN1m-cpRdAC5D1H0Ck27nm--PetaqyUpSbUsWUFUv3dF/exec?action=getPublicPlan";

        const blockStartZeiten = [
            { startStunde: 7,  startMinute: 15, name: "Start 07:15" },
            { startStunde: 8,  startMinute: 5,  name: "Start 08:05" },
            { startStunde: 8,  startMinute: 55, name: "Start 08:55" },
            { startStunde: 10, startMinute: 0,  name: "Start 10:00" },
            { startStunde: 10, startMinute: 50, name: "Start 10:50" },
            { startStunde: 11, startMinute: 40, name: "Start 11:40" },
            { startStunde: 12, startMinute: 50, name: "Start 12:50" },
            { startStunde: 13, startMinute: 40, name: "Start 13:40" },
            { startStunde: 14, startMinute: 30, name: "Start 14:30" },
            { startStunde: 15, startMinute: 35, name: "Start 15:35" },
            { startStunde: 16, startMinute: 25, name: "Start 16:25" },
            { startStunde: 17, startMinute: 15, name: "Start 17:15" }
        ];

        // Datum sofort beim Laden der Seite anzeigen (Client-seitig)
        const nowInitial = new Date();
        const optionsInitial = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('datum').innerText = nowInitial.toLocaleDateString('de-DE', optionsInitial);

        async function updateDisplay() {
            const div = document.getElementById('info');
            const tickerBanner = document.getElementById('news-ticker-banner');
            const tickerContent = document.getElementById('news-ticker-content');
            let data = null;

            // --- Bannermeldungen für Public-Seite laden ---
            try {
                const bannerUrl = URL.split('?')[0] + "?action=getBannerPublic&t=" + Date.now();
                const bannerRes = await fetch(bannerUrl);
                const bannerData = await bannerRes.json();

                if (bannerData && bannerData.length > 0) {
                    const alleMeldungen = bannerData.map(b => b.text).join(" &nbsp;&nbsp;&nbsp;&bull;&nbsp;&nbsp;&nbsp; ");
                    tickerContent.innerHTML = alleMeldungen;
                    tickerBanner.style.display = "flex";
                } else {
                    tickerBanner.style.display = "none";
                }
            } catch (err) {
                console.warn("Konnte Banner nicht laden:", err);
                tickerBanner.style.display = "none";
            }

            // Automatischer Wiederholungsversuch (Retry) bei temporären Netzwerkhängern
            for (let versuch = 0; versuch < 2; versuch++) {
                try {
                    const response = await fetch(URL);
                    data = await response.json();
                    break; 
                } catch (e) {
                    console.warn(`Versuch ${versuch + 1} fehlgeschlagen, versuche es erneut...`, e);
                    if (versuch === 0) {
                        await new Promise(resolve => setTimeout(resolve, 1500));
                    } else {
                        div.innerHTML = `<div class="hinweis" style="color: #e74c3c;">Fehler beim Laden der Daten...</div>`;
                        return;
                    }
                }
            }

            if (!data || !data.plan) return;
            const plan = data.plan;

            const now = new Date();
            document.getElementById('datum').innerText = now.toLocaleDateString('de-DE', optionsInitial);

            const currentMinutesToday = now.getHours() * 60 + now.getMinutes();

            let aktivBlockIndex = -1;

            for (let i = 0; i < blockStartZeiten.length; i++) {
                const b = blockStartZeiten[i];
                const startMinuten = b.startStunde * 60 + b.startMinute;
                const sichtbarAbMinuten = startMinuten - 10;

                let gueltigBisMinuten = startMinuten + 50; 
                if (i < blockStartZeiten.length - 1) {
                    const naechsterB = blockStartZeiten[i + 1];
                    const naechsterStartMinuten = naechsterB.startStunde * 60 + naechsterB.startMinute;
                    gueltigBisMinuten = naechsterStartMinuten - 10;
                }

                if (currentMinutesToday >= sichtbarAbMinuten && currentMinutesToday < gueltigBisMinuten) {
                    aktivBlockIndex = i;
                    break;
                }
            }

            if (aktivBlockIndex === -1) {
                div.innerHTML = `
                    <div class="block-titel">Momentan keine Hallenbelegung aktiviert</div>
                    <div class="hinweis">Die Hallenbelegung ist jeweils erst 10 Minuten vor Lektionsbeginn einsehbar...</div>
                `;
                return;
            }

            const aktuellerBlock = blockStartZeiten[aktivBlockIndex];
            let startSlotId = (aktivBlockIndex * 5) + 1;
            let endSlotId = startSlotId + 4;

            let gefundeneEintraege = [];
            for (let s = startSlotId; s <= endSlotId; s++) {
                if (plan[s] && plan[s].klasse && plan[s].klasse.trim() !== "") {
                    gefundeneEintraege.push({
                        klasse: plan[s].klasse,
                        halle: plan[s].halle || "Offen"
                    });
                }
            }

            let html = `<div class="block-titel">${aktuellerBlock.name}</div>`;

            if (gefundeneEintraege.length > 0) {
                gefundeneEintraege.forEach(item => {
                    html += `
                        <div class="lektion-eintrag">
                            <span class="klasse">${item.klasse}</span>
                            <span class="halle">${item.halle}</span>
                        </div>
                    `;
                });
            } else {
                html += `<div class="hinweis">In diesem Zeitfenster sind aktuell keine Hallen belegt.</div>`;
            }

            div.innerHTML = html;
        }

        updateDisplay();
        setInterval(updateDisplay, 60000);
    </script>
</body>
</html>
